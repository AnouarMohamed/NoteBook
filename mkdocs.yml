site_name: MOT Pricing
site_description: Research notes and numerical experiments in martingale optimal transport
site_url: https://anouarmohamed.github.io/NoteBook/
repo_url: https://github.com/AnouarMohamed/NoteBook
repo_name: AnouarMohamed/NoteBook

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Research Notes: research-notes.md
  - Numerical Notes: numerical-notes.md
  - Getting Started: getting-started.md
  - Examples: examples.md
  - Gallery Table: assets/gallery/gallery_summary.md
  - API Guide: api.md
  - Upgrade Notes: upgrade_notes.md
  - Publishing: publishing.md
